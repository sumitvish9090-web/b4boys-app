<!DOCTYPE html>
<html>
<head>
<title>B4BOYS</title>

<style>
body {
  background:black;
  color:lime;
  text-align:center;
  font-family:Arial;
}

input, button {
  margin:5px;
  padding:10px;
}

.entry {
  border:1px solid lime;
  margin:10px;
  padding:10px;
}
</style>

</head>

<body>

<h1>🔥 B4BOYS 🔥</h1>
<p>Made by Sumit</p>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<input id="note" placeholder="Practice"><br>
<input id="rating" type="number" placeholder="Rating"><br>

<button onclick="addData()">Add Entry</button>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

<h2>Entries</h2>
<div id="entries"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRryiKa35ZJkWHqDgoHAnscNPPzcqoEn0",
  authDomain: "b4-boys.firebaseapp.com",
  projectId: "b4-boys",
  storageBucket: "b4-boys.firebasestorage.app",
  messagingSenderId: "673941403433",
  appId: "1:673941403433:web:0e531535f4b6f63ce16938",
  measurementId: "G-0KBTLPXB5T"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

// SIGNUP
window.signup = function(){
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> alert("Signup Success 🔥"))
    .catch(err => alert(err.message));
}

// LOGIN
window.login = function(){
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> alert("Login Success 🔥"))
    .catch(err => alert(err.message));
}

// AUTH CHECK
onAuthStateChanged(auth, user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
    loadData();
  }
});

// ADD DATA
window.addData = async function(){
  await addDoc(collection(db,"dance"),{
    user: auth.currentUser.email,
    note: note.value,
    rating: Number(rating.value)
  });
}

// LOAD DATA
function loadData(){
  onSnapshot(collection(db,"dance"), snap=>{
    let html="";
    let scores={};

    snap.forEach(doc=>{
      let e = doc.data();

      html += `
      <div class="entry">
        <h3>${e.user}</h3>
        <p>${e.note}</p>
        <p>⭐ ${e.rating}</p>
      </div>
      `;

      scores[e.user]=(scores[e.user]||0)+e.rating;
    });

    entries.innerHTML = html;

    // leaderboard
    let lb="";
    Object.keys(scores).sort((a,b)=>scores[b]-scores[a])
    .forEach(u=>{
      lb += `<p>${u} - ${scores[u]}</p>`;
    });

    leaderboard.innerHTML = lb;
  });
}

</script>

</body>
</html>
