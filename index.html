<!DOCTYPE html>
<html>
<head>
<title>B4BOYS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:black;color:lime;text-align:center;font-family:Arial;}
input,button{margin:5px;padding:10px;}
.entry{border:1px solid lime;margin:10px;padding:10px;}
</style>

</head>

<body>

<h1>🔥 B4BOYS 🔥</h1>
<p>Made by Sumit</p>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<input id="note" placeholder="Practice"><br>
<input id="rating" type="number" placeholder="Rating"><br>
<input type="file" id="video"><br>

<button onclick="add()">Add Entry</button>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

<canvas id="chart"></canvas>

<h2>Entries</h2>
<div id="entries"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBRryiKa35ZJkWHqDgoHAnscNPPzcqoEn0",
  authDomain: "b4-boys.firebaseapp.com",
  projectId: "b4-boys",
  storageBucket: "b4-boys.firebasestorage.app",
  messagingSenderId: "673941403433",
  appId: "1:673941403433:web:0e531535f4b6f63ce16938",
  measurementId: "G-0KBTLPXB5T"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// AUTH
function signup(){
 firebase.auth().createUserWithEmailAndPassword(email.value,password.value);
}

function login(){
 firebase.auth().signInWithEmailAndPassword(email.value,password.value);
}

// USER LOGIN CHECK
firebase.auth().onAuthStateChanged(user=>{
 if(user){
   loginBox.style.display="none";
   app.style.display="block";
   loadData();
 }
});

// ADD ENTRY
function add(){

 let file = document.getElementById("video").files[0];
 let ref = storage.ref("videos/"+file.name);

 ref.put(file).then(()=>{
   ref.getDownloadURL().then(url=>{

     db.collection("dance").add({
       user: firebase.auth().currentUser.email,
       note: note.value,
       rating: Number(rating.value),
       video: url
     });

   });
 });
}

// LOAD DATA
function loadData(){

 db.collection("dance").onSnapshot(snap=>{

   let html="";
   let scores={};
   let ratings=[];

   snap.forEach(doc=>{
     let e=doc.data();

     html+=`
     <div class="entry">
       <h3>${e.user}</h3>
       <p>${e.note}</p>
       <p>⭐ ${e.rating}</p>
       <video src="${e.video}" width="200" controls></video>
     </div>
     `;

     scores[e.user]=(scores[e.user]||0)+e.rating;
     ratings.push(e.rating);
   });

   entries.innerHTML=html;

   // leaderboard
   let lb="";
   Object.keys(scores).sort((a,b)=>scores[b]-scores[a])
   .forEach(u=>{
     lb+=`<p>${u} - ${scores[u]}</p>`;
   });

   leaderboard.innerHTML=lb;

   // graph
   new Chart(document.getElementById("chart"), {
     type:"line",
     data:{
       labels: ratings.map((_,i)=>"Day "+(i+1)),
       datasets:[{label:"Progress",data:ratings}]
     }
   });

 });

}

// REMINDER
setInterval(()=>{
 alert("Practice time 🔥");
},86400000);

</script>

</body>
</html>
