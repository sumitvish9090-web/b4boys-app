<!DOCTYPE html>
<html>
<head>
<title>B4BOYS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {
  background:black;
  color:lime;
  text-align:center;
  font-family:Arial;
}
input,button {
  margin:5px;
  padding:10px;
}
</style>

</head>

<body>

<h1>🔥 B4BOYS 🔥</h1>
<p>Made by Sumit</p>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<h2>Logged in ✅</h2>
</div>

<script>

// 🔥 TERA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBRryiKa35ZJkWHqDgoHAnscNPPzcqoEn0",
  authDomain: "b4-boys.firebaseapp.com",
  projectId: "b4-boys",
  storageBucket: "b4-boys.firebasestorage.app",
  messagingSenderId: "673941403433",
  appId: "1:673941403433:web:0e531535f4b6f63ce16938",
  measurementId: "G-0KBTLPXB5T"
};

firebase.initializeApp(firebaseConfig);

// SIGNUP
function signup(){
  firebase.auth().createUserWithEmailAndPassword(
    email.value,
    password.value
  )
  .then(()=> alert("Signup Success 🔥"))
  .catch(err => alert(err.message));
}

// LOGIN
function login(){
  firebase.auth().signInWithEmailAndPassword(
    email.value,
    password.value
  )
  .then(()=> alert("Login Success 🔥"))
  .catch(err => alert(err.message));
}

// LOGIN CHECK
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
  }
});

</script>

</body>
</html>
